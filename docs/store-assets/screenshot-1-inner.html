<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=360" />
    <link rel="stylesheet" href="../../popup/popup.css" />
    <title>Cleen Popup Preview</title>
    <style>
      .ring-fill {
        stroke-dashoffset: 72;
      }

      .tab-list {
        max-height: none;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="card card--main">
        <div class="memory-ring">
          <svg viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="42"></circle>
            <circle class="ring-fill state-warning" cx="50" cy="50" r="42"></circle>
          </svg>
          <div class="memory-center">
            <span class="memory-value">2.6</span>
            <span class="memory-unit">GB</span>
          </div>
        </div>
        <div class="memory-info">
          <div class="memory-label">Total Memory</div>
          <div class="memory-detail">14 tabs (est)</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="card card--stat">
          <div class="stat-icon stat-icon--active">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="3" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.5"></rect>
              <path d="M5 3V2C5 1 6 0 8 0S11 1 11 2V3" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value">10</span>
            <span class="stat-label">Active</span>
          </div>
        </div>
        <div class="card card--stat active-filter">
          <div class="stat-icon stat-icon--suspended">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1.5"></rect>
              <path d="M6 7V5C6 3.34 7.34 2 9 2C10.66 2 12 3.34 12 5V7" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value">4</span>
            <span class="stat-label">Suspended</span>
          </div>
        </div>
        <div class="card card--stat">
          <div class="stat-icon stat-icon--heavy">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2L10 6L14 6.5L11 10L12 14L8 11.5L4 14L5 10L2 6.5L6 6L8 2Z" fill="currentColor"></path>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value">3</span>
            <span class="stat-label">Heavy</span>
          </div>
        </div>
      </div>

      <div class="card card--tabs">
        <div class="card-header">
          <span class="card-title">Tabs</span>
          <div class="tab-actions">
            <button class="tab-action-btn">←L</button>
            <button class="tab-action-btn">R→</button>
            <button class="tab-action-btn">Others</button>
            <button class="tab-action-btn tab-action-btn--primary">All</button>
          </div>
        </div>
        <div class="tab-list">
          <div class="tab-item">
            <div class="tab-favicon-placeholder"></div>
            <div class="tab-info">
              <span class="tab-title">Claude Project Workspace</span>
              <span class="tab-domain">claude.ai</span>
            </div>
            <span class="tab-memory">482 MB</span>
            <button class="tab-suspend-btn">Suspend</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon-placeholder"></div>
            <div class="tab-info">
              <span class="tab-title">YouTube Playlist</span>
              <span class="tab-domain">youtube.com</span>
            </div>
            <span class="tab-memory">364 MB</span>
            <button class="tab-suspend-btn">Suspend</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon-placeholder"></div>
            <div class="tab-info">
              <span class="tab-title">Figma Design System</span>
              <span class="tab-domain">figma.com</span>
            </div>
            <span class="tab-memory">228 MB</span>
            <button class="tab-suspend-btn">Suspend</button>
          </div>
          <div class="tab-item">
            <div class="tab-favicon-placeholder"></div>
            <div class="tab-info">
              <span class="tab-title">Docs Archive</span>
              <span class="tab-domain">docs.example</span>
            </div>
            <button class="tab-suspend-btn" disabled>Active</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
