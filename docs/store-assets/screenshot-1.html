<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>Cleen Store Screenshot</title>
    <style>
      html,
      body {
        margin: 0;
        width: 1280px;
        height: 800px;
        overflow: hidden;
        background: #05070d;
      }

      body {
        position: relative;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 78% 10%, rgba(0, 212, 170, 0.28), transparent 28%),
          radial-gradient(circle at 14% 86%, rgba(47, 111, 255, 0.22), transparent 30%),
          linear-gradient(160deg, #05070d 0%, #08131d 56%, #0b1827 100%);
      }

      .noise {
        position: absolute;
        inset: 0;
        opacity: 0.12;
        background-image: radial-gradient(rgba(255, 255, 255, 0.08) 0.5px, transparent 0.5px);
        background-size: 4px 4px;
      }

      .hero-copy {
        position: absolute;
        left: 92px;
        top: 88px;
        max-width: 420px;
        color: #f8f8f1;
      }

      .eyebrow {
        margin: 0 0 16px;
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #00ffcc;
      }

      h1 {
        margin: 0;
        font-size: 64px;
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .subhead {
        margin: 22px 0 0;
        font-size: 22px;
        line-height: 1.45;
        color: #b7bdcd;
      }

      .chips {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #f8f8f1;
        font-size: 14px;
      }

      .popup-shell {
        position: absolute;
        right: 110px;
        top: 72px;
        width: 360px;
        height: 444px;
        border: 0;
        border-radius: 24px;
        overflow: hidden;
        transform: scale(1.34);
        transform-origin: top right;
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.48),
          0 0 0 1px rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="noise"></div>

    <section class="hero-copy">
      <p class="eyebrow">Chrome Extension</p>
      <h1>Free memory without losing context.</h1>
      <p class="subhead">
        Track heavy tabs, auto-suspend inactive pages, and keep Chrome responsive with a single popup.
      </p>
      <div class="chips">
        <span class="chip">Auto-Suspend</span>
        <span class="chip">Memory Dashboard</span>
        <span class="chip">Heavy Site Detection</span>
      </div>
    </section>

    <iframe class="popup-shell" src="screenshot-1-inner.html" title="Cleen popup preview"></iframe>
  </body>
</html>
