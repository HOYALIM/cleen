<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="popup.css">
  <title>Cleen</title>
</head>
<body>
  <header class="header">
    <span class="header-title">Cleen</span>
    <button class="header-settings" disabled aria-label="Settings (coming soon)" title="Settings (coming soon)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6.5 1L6.1 2.6C5.7 2.8 5.3 3 5 3.2L3.4 2.7L1.9 5.3L3.2 6.3C3.2 6.5 3.2 6.7 3.2 7C3.2 7.3 3.2 7.5 3.2 7.7L1.9 8.7L3.4 11.3L5 10.8C5.3 11 5.7 11.2 6.1 11.4L6.5 13H9.5L9.9 11.4C10.3 11.2 10.7 11 11 10.8L12.6 11.3L14.1 8.7L12.8 7.7C12.8 7.5 12.8 7.3 12.8 7C12.8 6.7 12.8 6.5 12.8 6.3L14.1 5.3L12.6 2.7L11 3.2C10.7 3 10.3 2.8 9.9 2.6L9.5 1H6.5ZM8 5C9.1 5 10 5.9 10 7C10 8.1 9.1 9 8 9C6.9 9 6 8.1 6 7C6 5.9 6.9 5 8 5Z" fill="#999"/>
      </svg>
    </button>
  </header>

  <!-- Estimate banner — shown when chrome.processes unavailable -->
  <div class="estimate-banner" id="estimateBanner" hidden>
    Memory values are approximate
  </div>

  <section class="memory-section" role="status" aria-label="Total memory usage">
    <div class="memory-bar-track">
      <div class="memory-bar-fill" id="memoryBarFill" role="progressbar" aria-valuemin="0" aria-valuemax="4000" aria-valuenow="0"></div>
    </div>
    <div class="memory-label">
      <span id="memoryValue">0</span>
      <span class="memory-unit" id="memoryUnit">MB</span>
    </div>
  </section>

  <section class="tabs-section">
    <h2 class="section-title">Top Memory Usage</h2>
    <ul class="tab-list" id="tabList" aria-label="Top memory-consuming tabs">
      <li class="tab-item tab-item--empty">Scanning memory...</li>
    </ul>
  </section>

  <section class="heavy-section" id="heavySection" hidden>
    <h2 class="section-title">
      <span class="heavy-indicator" aria-hidden="true"></span>
      Heavy Tabs
    </h2>
    <ul class="tab-list" id="heavyTabList" aria-label="Heavy tabs"></ul>
  </section>

  <footer class="footer" aria-live="polite">
    <span id="footerStats">0 tabs suspended</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
