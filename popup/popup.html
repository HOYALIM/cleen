<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>Cleen</title>
</head>
<body>
  <header class="header">
    <span class="header-title">Cleen</span>
    <button class="settings-btn" id="settingsBtn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 11.25a2.25 2.25 0 100-4.5 2.25 2.25 0 000 4.5z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14.55 11.25a1.125 1.125 0 00.195 1.24l.04.039a1.516 1.516 0 11-2.144 2.144l-.039-.04a1.125 1.125 0 00-1.24-.195 1.125 1.125 0 00-.675 1.03v.116a1.516 1.516 0 11-3.032 0v-.067a1.125 1.125 0 00-.724-1.058 1.125 1.125 0 00-1.239.195l-.04.04a1.516 1.516 0 11-2.143-2.145l.039-.04a1.125 1.125 0 00.195-1.24 1.125 1.125 0 00-1.03-.675h-.116a1.516 1.516 0 110-3.032h.067a1.125 1.125 0 001.058-.724 1.125 1.125 0 00-.195-1.24l-.04-.039a1.516 1.516 0 112.144-2.144l.039.04a1.125 1.125 0 001.24.195h.05a1.125 1.125 0 00.675-1.03v-.116a1.516 1.516 0 113.032 0v.067a1.125 1.125 0 00.724 1.058 1.125 1.125 0 001.24-.195l.04-.04a1.516 1.516 0 112.144 2.144l-.04.039a1.125 1.125 0 00-.194 1.24v.05a1.125 1.125 0 001.03.675h.116a1.516 1.516 0 110 3.032h-.067a1.125 1.125 0 00-1.058.724z" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
  </header>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="settings-close" id="settingsClose">&times;</button>
    </div>
    <div class="settings-content">
      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">Auto-suspend threshold</span>
          <select class="settings-select" id="thresholdSelect">
            <option value="600000">10 min</option>
            <option value="1800000">30 min</option>
            <option value="3600000">1 hour</option>
            <option value="7200000">2 hours</option>
            <option value="0">Disabled</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">Keyboard shortcut</span>
          <span class="settings-shortcut" id="shortcutDisplay">Click to set</span>
        </div>
        <div class="settings-hint">Click and press keys to set shortcut</div>
      </div>
    </div>
  </div>

  <div class="dashboard">
    <div class="card card--main">
      <div class="memory-ring">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="42"/>
          <circle class="ring-fill" id="memoryRing" cx="50" cy="50" r="42"/>
        </svg>
        <div class="memory-center">
          <span class="memory-value" id="memoryValue">0</span>
          <span class="memory-unit" id="memoryUnit">MB</span>
        </div>
      </div>
      <div class="memory-info">
        <div class="memory-label">Total Memory</div>
        <div class="memory-detail" id="memoryDetail">0 tabs</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="card card--stat">
        <div class="stat-icon stat-icon--active">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 3V2C5 1 6 0 8 0S11 1 11 2V3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="activeValue">0</span>
          <span class="stat-label">Active</span>
        </div>
      </div>
      <div class="card card--stat">
        <div class="stat-icon stat-icon--suspended">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 7V5C6 3.34 7.34 2 9 2C10.66 2 12 3.34 12 5V7" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="suspendedValue">0</span>
          <span class="stat-label">Suspended</span>
        </div>
      </div>
      <div class="card card--stat">
        <div class="stat-icon stat-icon--heavy">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2L10 6L14 6.5L11 10L12 14L8 11.5L4 14L5 10L2 6.5L6 6L8 2Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="heavyValue">0</span>
          <span class="stat-label">Heavy</span>
        </div>
      </div>
    </div>

    <div class="card card--tabs">
      <div class="card-header">
        <div class="card-header-left">
          <span class="card-title">Tabs</span>
          <div class="filter-tabs">
            <button class="filter-btn filter-btn--active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">☀️ Active</button>
            <button class="filter-btn" data-filter="discarded">🌙 Suspended</button>
          </div>
        </div>
        <div class="tab-actions">
          <button class="tab-action-btn" id="suspendLeftBtn">←L</button>
          <button class="tab-action-btn" id="suspendRightBtn">R→</button>
          <button class="tab-action-btn" id="suspendOthersBtn">Others</button>
          <button class="tab-action-btn tab-action-btn--primary" id="suspendAllBtn">All</button>
        </div>
      </div>
      <div class="tab-list" id="tabList">
        <div class="tab-item tab-item--empty">No tabs</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
