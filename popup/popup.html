<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>Cleen</title>
</head>
<body>
  <div class="dashboard">
    <div class="card card--main">
      <div class="memory-ring">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="42"/>
          <circle class="ring-fill" id="memoryRing" cx="50" cy="50" r="42"/>
        </svg>
        <div class="memory-center">
          <span class="memory-value" id="memoryValue">0</span>
          <span class="memory-unit" id="memoryUnit">MB</span>
        </div>
      </div>
      <div class="memory-info">
        <div class="memory-label">Total Memory</div>
        <div class="memory-detail" id="memoryDetail">0 tabs</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="card card--stat" id="statActive" data-filter="active">
        <div class="stat-icon stat-icon--active">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 3V2C5 1 6 0 8 0S11 1 11 2V3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="activeValue">0</span>
          <span class="stat-label">Active</span>
        </div>
      </div>
      <div class="card card--stat" id="statSuspended" data-filter="discarded">
        <div class="stat-icon stat-icon--suspended">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 7V5C6 3.34 7.34 2 9 2C10.66 2 12 3.34 12 5V7" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="suspendedValue">0</span>
          <span class="stat-label">Suspended</span>
        </div>
      </div>
      <div class="card card--stat" id="statHeavy" data-filter="heavy">
        <div class="stat-icon stat-icon--heavy">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2L10 6L14 6.5L11 10L12 14L8 11.5L4 14L5 10L2 6.5L6 6L8 2Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="stat-content">
          <span class="stat-value" id="heavyValue">0</span>
          <span class="stat-label">Heavy</span>
        </div>
      </div>
    </div>

    <div class="card card--tabs">
      <div class="card-header">
        <span class="card-title">Tabs</span>
        <div class="tab-actions">
          <button class="tab-action-btn" id="suspendLeftBtn">←L</button>
          <button class="tab-action-btn" id="suspendRightBtn">R→</button>
          <button class="tab-action-btn" id="suspendOthersBtn">Others</button>
          <button class="tab-action-btn tab-action-btn--primary" id="suspendAllBtn">All</button>
        </div>
      </div>
      <div class="tab-list" id="tabList">
        <div class="tab-item tab-item--empty">No tabs</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
